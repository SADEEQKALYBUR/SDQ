<link rel = "stylesheet" href="css/login.css">
<div class="login-container">
    <div class="logo-area">
    <img src="images/logo.png" alt="Logo" class="site-logo">
        <h1 class="brand-name">MR. A SPORT <span>& MORE</span></h1>
    </div>

    <form action="/login" method="POST" class="login-form">
        <div class="input-group">
            <input type="text" name="username" placeholder="Username" required>
        </div>
        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit" class="animated-btn">Login</button>
        
        <div class="social-login">
            <p>Or login with:</p>
            <div class="icons">
                <a href="#" class="fa-brands fa-snapchat"></a>
                <a href="#" class="fa-brands fa-github"></a>
                <a href="#" class="fa-brands fa-facebook"></a>
                <a href="#" class="fa-brands fa-google"></a>
            </div>
        </div>
    </form>
</div>
