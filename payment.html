<!DOCTYPE html>
<html>
<head>
  <title>Payment Page</title>
  <link rel="stylesheet" href="css/payment.css">
</head>
<body>

<div class="order-container">

  <div class="order-icon">
    💳
  </div>

  <h2 class="order-title">Order Summary</h2>

  <div class="order-row">
    <span>Product:</span>
    <span id="pName"></span>
  </div>

  <div class="order-row">
    <span>Price:</span>
    <span>₦<span id="pPrice"></span></span>
  </div>

  <div class="order-row">
    <span>Quantity:</span>
    <span id="pQty"></span>
  </div>

  <hr class="divider">

  <div class="order-row total-row">
    <span>Total:</span>
    <span>₦<span id="pTotal"></span></span>
  </div>

 <button class="payment-button" onclick="payWithPaystack()">
  Proceed to Pay
</button>

</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
  <script src="js/payment.js"></script>
</body>
</html>
